services:
  arcee-signup:
    image: sunqb/arcee:latest
    command: ["-mode", "signup", "-count", "${SIGNUP_COUNT:-1}", "-config", "/app/config.json"]
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - tokens:/app/tokens
      - ./config.json:/app/config.json:ro
    restart: "no"

  arcee-server:
    image: sunqb/arcee:latest
    command: ["-mode", "serve", "-config", "/app/config.json"]
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - tokens:/app/tokens
      - ./config.json:/app/config.json:ro
    ports:
      - "${LISTEN_PORT:-8787}:8787"
    depends_on:
      arcee-signup:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  tokens:
